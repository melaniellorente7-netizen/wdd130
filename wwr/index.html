<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content=" Website project about a white water rafting company">
    <meta name="author" content="Melanie Llorente">
    <title>HOME White Waters Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="grid">
        <img src="images/z-crossedoars.jpeg" alt="Z-crossedoars Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="grid">
        <section class="hero">
            <img src="images/home-rafting.jpg" alt="group of people rafting">
            <div class="hero-content">
                <h1>White Waters Rafting</h1>
                <article class="hero-box">
                    <p>Make Memories with White Waters Rafting!</p>
                    <a href="contact.html" class="btn-main">Book Now!</a>
                </article>
            </div>
        </section>

        <section class="adventure">
            <h2>Adventure Awaits You!</h2>
            <div class="adventure-grid">
                <figure class="adventure-item">
                    <img src="images/losdientes.jpg" alt="Picture of Canal de los Dientes.">
                    <figcaption>Rivers</figcaption>
                </figure>
                <figure class="adventure-item">
                    <img src="images/camping.jpg" alt="Camping scenery.">
                    <figcaption>Camping</figcaption>
                </figure>
                <figure class="adventure-item">
                    <img src="images/boat.jpg" alt="White water rapids.">
                    <figcaption>Rapids</figcaption>
                </figure>
            </div>
        </section>

        <section class="newsletter-section">
            <h2>More Than Just The Thrill</h2>
            <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit...</p>

            <form class="newsletter-form">
                <h3>Join our Newsletter</h3>
                <div class="form-group">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <button type="submit">Join Us</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="grid">
        <p>© 2026 White Waters Rafting | Melanie Llorente</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.png" alt="Linkedin"></a>
            <a href="https://instagram.com"><img src="images/instagram.png" alt="Instagram"></a>
        </nav>
    </footer>
</body>

</html>
