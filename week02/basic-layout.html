<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HMTL elements">
    <meta name="author" content="Melanie Llorente">
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="a computer with some HTML elements" width="128"
          height="128">
    </header>
    <nav>
        <ul>
            <li><a href="https://www.byupathway.edu/">BYU-Pathway</a></li>
            <li><a href="https://churchofjesuschrist.org">The Church of Jesuschrist of Latter Days
                    Saints</a></li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Heading1</h2>
            <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Repellendus, libero?</p>
        </section>
        <section>
            <h2>Heading2</h2>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Commodi, ex.</p>
        </section>
    </main>
    <aside><img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/accra-ghana/320x200/accra-ghana-temple-758797-wallpaper.jpg"
          width="200">
    </aside>
    <footer>
        <p>Melanie Llorente</p>
    </footer>

</body>

</html>
